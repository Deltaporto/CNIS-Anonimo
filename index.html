<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anonimizador CNIS — LGPD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;600;700&family=Archivo:wght@400;500&family=JetBrains+Mono:wght@400;600&display=swap" />
  <link rel="stylesheet" href="css/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-inss">Anonimizador CNIS</div>
    <div class="logo-badge">LGPD</div>
  </div>
</header>

<main>

  <div class="aviso-lgpd">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
      <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 13A6 6 0 1 1 8 2a6 6 0 0 1 0 12z"/>
      <path d="M8 5a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0v-4A.5.5 0 0 1 8 5zm0 6.5a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5z"/>
    </svg>
    <span>Os PDFs são processados <strong>só no seu navegador</strong>. Nenhum dado é enviado para servidores.</span>
  </div>

  <!-- ZONA DE UPLOAD -->
  <div class="zona-upload" id="zona-upload">
    <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" fill="currentColor" viewBox="0 0 16 16">
      <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
      <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
    </svg>
    <p class="upload-titulo">Arraste os extratos CNIS aqui</p>
    <p class="upload-sub">ou <strong>clique para selecionar</strong> · um ou vários arquivos</p>
    <input type="file" id="input-arquivo" accept=".pdf,application/pdf" multiple />
  </div>

  <!-- LISTA DE ARQUIVOS -->
  <div id="lista-arquivos" class="oculto"></div>

  <!-- AÇÕES GLOBAIS -->
  <div id="acoes-globais" class="oculto">
    <button class="btn btn-primario btn-grande" id="btn-baixar-zip">
      ⬇ Baixar todos anonimizados (ZIP)
    </button>
    <button class="btn btn-secundario" id="btn-limpar">Limpar e recomeçar</button>
  </div>

</main>

<footer>
  Ferramenta de anonimização LGPD · Nenhum dado armazenado ou transmitido
</footer>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
</script>
<script src="js/fake-data.js"></script>
<script src="js/pdf-processor.js"></script>
<script src="js/app.js"></script>

</body>
</html>
